# Prometheus + Grafana monitoring stack for the fraud-experiments namespace.
# Self-provisioning: datasource + dashboards via ConfigMap mounts.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: fraud-experiments
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/alerts/*.yml
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'fraud-inference-api'
        metrics_path: /metrics
        static_configs:
          - targets: ['fraud-inference.fraud-experiments.svc:8000']
            labels: {tier: model, app: fraud-inference}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alerts
  namespace: fraud-experiments
data:
  alerts.yml: |
    groups:
      - name: fraud-system
        interval: 30s
        rules:
          - alert: HighAPILatency
            expr: histogram_quantile(0.95, rate(fraud_api_latency_seconds_bucket[5m])) > 0.5
            for: 2m
            labels: {severity: warning, trigger_retrain: "false"}
            annotations: {summary: "API p95 latency > 500ms"}
          - alert: HighErrorRate
            expr: (sum(rate(fraud_api_requests_total{status="error"}[5m])) / sum(rate(fraud_api_requests_total[5m]))) > 0.05
            for: 1m
            labels: {severity: warning, trigger_retrain: "false"}
            annotations: {summary: "API error rate > 5%"}
      - name: fraud-model
        interval: 30s
        rules:
          - alert: FraudRecallDrop
            expr: |
              (rate(fraud_api_predictions_fraud_total[5m])
               / (rate(fraud_api_predictions_fraud_total[5m])
                  + rate(fraud_api_predictions_legit_total[5m]))) < 0.015
            for: 2m
            labels: {severity: critical, trigger_retrain: "true"}
            annotations: {summary: "Fraud-flag rate dropped below baseline"}
          - alert: HighFalsePositiveRate
            expr: |
              (rate(fraud_api_label_fp_total[5m])
               / (rate(fraud_api_label_fp_total[5m]) + rate(fraud_api_label_tn_total[5m]))) > 0.10
            for: 2m
            labels: {severity: warning, trigger_retrain: "false"}
            annotations: {summary: "Live FPR > 10%"}
      - name: fraud-data
        interval: 30s
        rules:
          - alert: FeatureDriftHigh
            expr: max(fraud_api_feature_psi) > 0.25
            for: 2m
            labels: {severity: warning, trigger_retrain: "true"}
            annotations: {summary: "Feature PSI exceeded 0.25"}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: fraud-experiments
spec:
  replicas: 1
  selector: {matchLabels: {app: prometheus}}
  template:
    metadata: {labels: {app: prometheus}}
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - {containerPort: 9090}
          volumeMounts:
            - {name: config, mountPath: /etc/prometheus}
            - {name: alerts, mountPath: /etc/prometheus/alerts}
          resources:
            requests: {cpu: 200m, memory: 256Mi}
            limits:   {cpu: 500m, memory: 512Mi}
      volumes:
        - {name: config, configMap: {name: prometheus-config}}
        - {name: alerts, configMap: {name: prometheus-alerts}}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: fraud-experiments
spec:
  selector: {app: prometheus}
  ports:
    - {port: 9090, targetPort: 9090}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: fraud-experiments
spec:
  replicas: 1
  selector: {matchLabels: {app: grafana}}
  template:
    metadata: {labels: {app: grafana}}
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          env:
            - {name: GF_SECURITY_ADMIN_PASSWORD, value: admin1234}
            - {name: GF_USERS_ALLOW_SIGN_UP, value: "false"}
            - {name: GF_AUTH_ANONYMOUS_ENABLED, value: "true"}
            - {name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: "Viewer"}
          ports:
            - {containerPort: 3000}
          volumeMounts:
            - {name: ds, mountPath: /etc/grafana/provisioning/datasources}
            - {name: dp, mountPath: /etc/grafana/provisioning/dashboards}
            - {name: db, mountPath: /var/lib/grafana/dashboards}
          resources:
            requests: {cpu: 200m, memory: 256Mi}
            limits:   {cpu: 500m, memory: 512Mi}
      volumes:
        - {name: ds, configMap: {name: grafana-datasources}}
        - {name: dp, configMap: {name: grafana-dashboard-provider}}
        - {name: db, configMap: {name: grafana-dashboards}}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: fraud-experiments
spec:
  selector: {app: grafana}
  ports:
    - {port: 3000, targetPort: 3000}
