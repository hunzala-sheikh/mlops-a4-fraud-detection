apiVersion: v1
data:
  data_drift.json: |
    {
      "title": "Fraud — Data Drift",
      "uid": "fraud-drift",
      "tags": ["mlops", "fraud", "drift"],
      "schemaVersion": 39,
      "refresh": "1m",
      "time": {"from": "now-12h", "to": "now"},
      "panels": [
        {
          "type": "timeseries",
          "title": "Missing fields per request (p50 / p95)",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 7},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "histogram_quantile(0.50, rate(fraud_api_missing_features_bucket[15m]))", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, rate(fraud_api_missing_features_bucket[15m]))", "legendFormat": "p95"}
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {"value": null, "color": "green"},
                  {"value": 5, "color": "red"}
                ]
              }
            }
          }
        },
        {
          "type": "alertlist",
          "title": "Drift / Recall alerts (firing)",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 7},
          "options": {
            "stateFilter": {"firing": true, "pending": true},
            "groupMode": "default",
            "alertName": "Fraud"
          }
        },
        {
          "type": "timeseries",
          "title": "Mean predicted probability drift from baseline (0.05)",
          "gridPos": {"x": 0, "y": 7, "w": 12, "h": 7},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "(rate(fraud_api_predicted_probability_sum[10m]) / rate(fraud_api_predicted_probability_count[10m])) - 0.05",
            "legendFormat": "drift_from_baseline"
          }]
        },
        {
          "type": "timeseries",
          "title": "Feature distribution drift (PSI per top feature)",
          "gridPos": {"x": 12, "y": 7, "w": 12, "h": 7},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "fraud_api_feature_psi",
            "legendFormat": "{{feature}}"
          }],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {"value": null, "color": "green"},
                  {"value": 0.10, "color": "yellow"},
                  {"value": 0.25, "color": "red"}
                ]
              }
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Input data anomalies (out-of-range values per minute)",
          "gridPos": {"x": 0, "y": 14, "w": 24, "h": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "rate(fraud_api_input_anomalies_total[5m])",
            "legendFormat": "{{kind}}"
          }]
        }
      ]
    }
  model_performance.json: |
    {
      "title": "Fraud — Model Performance",
      "uid": "fraud-model",
      "tags": ["mlops", "fraud", "model"],
      "schemaVersion": 39,
      "refresh": "30s",
      "time": {"from": "now-3h", "to": "now"},
      "panels": [
        {
          "type": "timeseries",
          "title": "Fraud-flag rate (recall proxy)",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 7},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "rate(fraud_api_predictions_fraud_total[10m]) / (rate(fraud_api_predictions_fraud_total[10m]) + rate(fraud_api_predictions_legit_total[10m]))",
            "legendFormat": "fraud_rate"
          }]
        },
        {
          "type": "timeseries",
          "title": "Predicted probability distribution (rolling avg)",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 7},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "rate(fraud_api_predicted_probability_sum[5m]) / rate(fraud_api_predicted_probability_count[5m])",
            "legendFormat": "mean_proba"
          }]
        },
        {
          "type": "timeseries",
          "title": "False Positive Rate (FP / (FP+TN))",
          "gridPos": {"x": 0, "y": 7, "w": 12, "h": 7},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "rate(fraud_api_label_fp_total[10m]) / (rate(fraud_api_label_fp_total[10m]) + rate(fraud_api_label_tn_total[10m]))",
            "legendFormat": "fpr"
          }],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {"value": null, "color": "green"},
                  {"value": 0.05, "color": "yellow"},
                  {"value": 0.10, "color": "red"}
                ]
              }
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Precision–Recall trade-off",
          "gridPos": {"x": 12, "y": 7, "w": 12, "h": 7},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "rate(fraud_api_label_tp_total[10m]) / (rate(fraud_api_label_tp_total[10m]) + rate(fraud_api_label_fp_total[10m]))",
              "legendFormat": "precision"
            },
            {
              "expr": "rate(fraud_api_label_tp_total[10m]) / (rate(fraud_api_label_tp_total[10m]) + rate(fraud_api_label_fn_total[10m]))",
              "legendFormat": "recall"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Predictions in last 24h - Fraud",
          "gridPos": {"x": 0, "y": 14, "w": 6, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "increase(fraud_api_predictions_fraud_total[24h])"}]
        },
        {
          "type": "stat",
          "title": "Predictions in last 24h - Legit",
          "gridPos": {"x": 6, "y": 14, "w": 6, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "increase(fraud_api_predictions_legit_total[24h])"}]
        },
        {
          "type": "timeseries",
          "title": "Prediction confidence distribution (histogram buckets)",
          "gridPos": {"x": 12, "y": 14, "w": 12, "h": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{
            "expr": "rate(fraud_api_predicted_probability_bucket[5m])",
            "legendFormat": "<= {{le}}"
          }]
        }
      ]
    }
  system_health.json: |
    {
      "title": "Fraud — System Health",
      "uid": "fraud-system",
      "tags": ["mlops", "fraud", "system"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {
          "type": "timeseries",
          "title": "API request rate (req/s)",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 7},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "rate(fraud_api_requests_total[1m])", "legendFormat": "{{status}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Latency (p50 / p95 / p99)",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 7},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "histogram_quantile(0.50, rate(fraud_api_latency_seconds_bucket[5m]))", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, rate(fraud_api_latency_seconds_bucket[5m]))", "legendFormat": "p95"},
            {"expr": "histogram_quantile(0.99, rate(fraud_api_latency_seconds_bucket[5m]))", "legendFormat": "p99"}
          ]
        },
        {
          "type": "stat",
          "title": "Error rate %",
          "gridPos": {"x": 0, "y": 7, "w": 8, "h": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "100 * rate(fraud_api_requests_total{status=\"error\"}[5m]) / rate(fraud_api_requests_total[5m])"}
          ]
        },
        {
          "type": "timeseries",
          "title": "CPU usage (cores)",
          "gridPos": {"x": 8, "y": 7, "w": 8, "h": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"fraud-experiments\"}[5m])) by (pod)", "legendFormat": "{{pod}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Memory usage (MB)",
          "gridPos": {"x": 16, "y": 7, "w": 8, "h": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(container_memory_working_set_bytes{namespace=\"fraud-experiments\"}) by (pod) / 1024 / 1024", "legendFormat": "{{pod}}"}
          ]
        }
      ]
    }
kind: ConfigMap
metadata:
  creationTimestamp: null
  name: grafana-dashboards
  namespace: fraud-experiments
