apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fraud-artifacts-pvc
  namespace: fraud-experiments
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fraud-models-pvc
  namespace: fraud-experiments
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fraud-data-pvc
  namespace: fraud-experiments
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
