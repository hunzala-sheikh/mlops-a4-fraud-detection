apiVersion: v1
kind: ResourceQuota
metadata:
  name: fraud-quota
  namespace: fraud-experiments
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 8Gi
    limits.cpu: "12"
    limits.memory: 12Gi
    persistentvolumeclaims: "5"
    pods: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: fraud-limits
  namespace: fraud-experiments
spec:
  limits:
  - default:
      cpu: 1
      memory: 1Gi
    defaultRequest:
      cpu: 250m
      memory: 256Mi
    type: Container
