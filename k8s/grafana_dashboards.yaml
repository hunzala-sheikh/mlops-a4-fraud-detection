# Grafana provisioning: datasource + dashboard providers + the 3 dashboards.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: fraud-experiments
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus.fraud-experiments.svc:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: fraud-experiments
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: Fraud
        orgId: 1
        folder: Fraud
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
