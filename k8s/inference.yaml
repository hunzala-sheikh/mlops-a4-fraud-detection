apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-inference
  namespace: fraud-experiments
  labels: {app: fraud-inference, tier: model}
spec:
  replicas: 1
  selector: {matchLabels: {app: fraud-inference}}
  template:
    metadata:
      labels: {app: fraud-inference, tier: model}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: fraud-inference:v1
          imagePullPolicy: IfNotPresent
          ports:
            - {containerPort: 8000, name: http}
          env:
            - {name: MODEL_PATH,    value: /models/deployed_model.pkl}
            - {name: MODEL_VERSION, value: v1.0.0}
          readinessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: {cpu: 250m, memory: 512Mi}
            limits:   {cpu: 1,    memory: 1Gi}
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-inference
  namespace: fraud-experiments
  labels: {app: fraud-inference, tier: model}
spec:
  selector: {app: fraud-inference}
  ports:
    - {name: http, port: 8000, targetPort: 8000}
