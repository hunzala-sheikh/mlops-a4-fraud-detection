          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ingest_data(raw_data: Output[Dataset]) -> str:\n    \"\"\"Load\
          \ fraud CSV. If not present, regenerate from seed.\"\"\"\n    import json\n\
          \    import os\n    from pathlib import Path\n    import numpy as np\n \
          \   import pandas as pd\n\n    candidates = [\"/data/fraud.csv\", \"/mnt/data/fraud.csv\"\
          , \"data/fraud.csv\"]\n    src = next((p for p in candidates if Path(p).exists()),\
          \ None)\n\n    if src is None:\n        # Inline generator \u2014 synthetic\
          \ dataset that mimics IEEE CIS structure\n        rng = np.random.default_rng(42)\n\
          \        n_rows, fraud_rate = 50_000, 0.035\n        n_fraud = int(n_rows\
          \ * fraud_rate)\n        n_legit = n_rows - n_fraud\n\n        def _block(n,\
          \ base, shift_v):\n            d = pd.DataFrame({\n                \"TransactionID\"\
          : np.arange(n) + base,\n                \"TransactionDT\": rng.integers(86_400,\
          \ 86_400 * 180, size=n),\n                \"TransactionAmt\": np.exp(rng.normal(3.5\
          \ + shift_v * 0.7, 1.0, n)).round(2),\n                \"ProductCD\": rng.choice([\"\
          W\", \"C\", \"R\", \"H\", \"S\"], n),\n                \"card1\": rng.integers(1,\
          \ 18000, n),\n                \"card4\": rng.choice([\"visa\", \"mastercard\"\
          , \"discover\", \"amex\", np.nan], n),\n                \"card6\": rng.choice([\"\
          debit\", \"credit\", np.nan], n),\n                \"P_emaildomain\": rng.choice(\n\
          \                    [\"gmail.com\", \"yahoo.com\", \"hotmail.com\", \"\
          anonymous.com\", np.nan], n),\n                \"DeviceType\": rng.choice([\"\
          mobile\", \"desktop\", np.nan], n),\n            })\n            for i in\
          \ range(1, 15):\n                col = rng.normal(shift_v * (i % 3 - 1)\
          \ * 0.6, 1.0 + shift_v * 0.1, n)\n                col[rng.random(n) < 0.05\
          \ + shift_v * 0.03] = np.nan\n                d[f\"V{i}\"] = col\n     \
          \       d[\"isFraud\"] = int(shift_v > 0)\n            return d\n\n    \
          \    df = pd.concat([_block(n_legit, 1_000_000, 0.0),\n                \
          \        _block(n_fraud, 2_000_000, 1.0)], ignore_index=True)\n        df\
          \ = df.sample(frac=1.0, random_state=42).reset_index(drop=True)\n    else:\n\
          \        df = pd.read_csv(src)\n\n    df.to_csv(raw_data.path, index=False)\n\
          \    summary = {\n        \"n_rows\": int(len(df)),\n        \"n_cols\"\
          : int(df.shape[1]),\n        \"fraud_rate\": float(df[\"isFraud\"].mean()),\n\
          \        \"missing_total\": int(df.isna().sum().sum()),\n    }\n    print(f\"\
          [INGEST] {summary}\")\n    return json.dumps(summary)\n\n"
