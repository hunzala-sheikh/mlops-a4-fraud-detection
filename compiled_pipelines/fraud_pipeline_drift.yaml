          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_model(\n    train_fe: Input[Dataset],\n    model_out: Output[Model],\n\
          \    model_type: str = \"xgboost\",\n    cost_sensitive: bool = False,\n\
          \    fn_penalty: float = 5.0,\n    n_estimators: int = 200,\n    max_depth:\
          \ int = 6,\n    random_state: int = 42,\n) -> str:\n    import json\n  \
          \  import pickle  # standard for sklearn model serialization\n    import\
          \ numpy as np\n    import pandas as pd\n\n    df = pd.read_csv(train_fe.path)\n\
          \    y = df[\"isFraud\"].values.astype(int)\n    X = df.drop(columns=[\"\
          isFraud\"]).values\n\n    pos = max(int(y.sum()), 1)\n    neg = len(y) -\
          \ pos\n    base_pos_weight = neg / pos\n    pos_weight = base_pos_weight\
          \ * fn_penalty if cost_sensitive else 1.0\n\n    if model_type == \"xgboost\"\
          :\n        from xgboost import XGBClassifier\n        model = XGBClassifier(\n\
          \            n_estimators=n_estimators, max_depth=max_depth,\n         \
          \   learning_rate=0.1, random_state=random_state, n_jobs=1,\n          \
          \  scale_pos_weight=pos_weight, eval_metric=\"auc\",\n            tree_method=\"\
          hist\",\n        ).fit(X, y)\n        params = {\"n_estimators\": n_estimators,\
          \ \"max_depth\": max_depth,\n                  \"learning_rate\": 0.1, \"\
          scale_pos_weight\": float(pos_weight)}\n    elif model_type == \"lightgbm\"\
          :\n        from lightgbm import LGBMClassifier\n        model = LGBMClassifier(\n\
          \            n_estimators=n_estimators, max_depth=max_depth,\n         \
          \   learning_rate=0.05, random_state=random_state, n_jobs=1,\n         \
          \   scale_pos_weight=pos_weight,\n            verbose=-1,\n        ).fit(X,\
          \ y)\n        params = {\"n_estimators\": n_estimators, \"max_depth\": max_depth,\n\
          \                  \"learning_rate\": 0.05, \"scale_pos_weight\": float(pos_weight)}\n\
          \    elif model_type == \"rf_fs\":\n        from sklearn.ensemble import\
          \ RandomForestClassifier\n        from sklearn.feature_selection import\
          \ RFE\n        base = RandomForestClassifier(n_estimators=50, random_state=random_state,\
          \ n_jobs=1)\n        n_keep = min(20, X.shape[1])\n        sel = RFE(base,\
          \ n_features_to_select=n_keep).fit(X, y)\n        X_sel = sel.transform(X)\n\
          \        cw = {0: 1.0, 1: float(pos_weight)} if cost_sensitive else \"balanced\"\
          \n        model_final = RandomForestClassifier(\n            n_estimators=n_estimators,\
          \ max_depth=max_depth,\n            random_state=random_state, n_jobs=1,\n\
          \            class_weight=cw,\n        ).fit(X_sel, y)\n\n        class\
          \ _RFEPipeline:\n            def __init__(self, sel, model): self.sel, self.model\
          \ = sel, model\n            def predict(self, X): return self.model.predict(self.sel.transform(X))\n\
          \            def predict_proba(self, X): return self.model.predict_proba(self.sel.transform(X))\n\
          \        model = _RFEPipeline(sel, model_final)\n        params = {\"n_estimators\"\
          : n_estimators, \"max_depth\": max_depth,\n                  \"n_features_selected\"\
          : int(n_keep), \"class_weight\": str(cw)}\n    else:\n        raise ValueError(f\"\
          Unknown model_type: {model_type}\")\n\n    bundle = {\n        \"model\"\
          : model,\n        \"model_type\": model_type,\n        \"cost_sensitive\"\
          : cost_sensitive,\n        \"fn_penalty\": float(fn_penalty),\n        \"\
          params\": params,\n    }\n    with open(model_out.path, \"wb\") as f:\n\
          \        pickle.dump(bundle, f)\n\n    summary = {**params, \"model_type\"\
          : model_type, \"cost_sensitive\": cost_sensitive,\n               \"n_train\"\
          : int(len(y)), \"train_fraud_rate\": float(y.mean())}\n    print(f\"[TRAIN]\
          \ {summary}\")\n    return json.dumps(summary)\n\n"
