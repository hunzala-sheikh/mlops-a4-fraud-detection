# PIPELINE DEFINITION
# Name: fraud-pipeline-drift
# Description: A4 Task 7 — Same pipeline but with time-based train/test split
# Inputs:
#    auc_threshold: float [Default: 0.85]
#    cost_sensitive: bool [Default: False]
#    imbalance_strategy: str [Default: 'class_weight']
#    model_type: str [Default: 'xgboost']
components:
  comp-condition-1:
    dag:
      tasks:
        deploy-model:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-deploy-model
          inputs:
            artifacts:
              metrics:
                componentInputArtifact: pipelinechannel--evaluate-model-metrics
              model_in:
                componentInputArtifact: pipelinechannel--train-model-model_out
            parameters:
              auc_threshold:
                componentInputParameter: pipelinechannel--auc_threshold
          taskInfo:
            name: deploy-model
    inputDefinitions:
      artifacts:
        pipelinechannel--evaluate-model-metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        pipelinechannel--train-model-model_out:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--auc_threshold:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--evaluate-model-Output:
          parameterType: STRING
  comp-deploy-model:
    executorLabel: exec-deploy-model
    inputDefinitions:
      artifacts:
        metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        model_in:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        auc_threshold:
          defaultValue: 0.85
          isOptional: true
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        deployed_marker:
          artifactType:
            schemaTitle: system.Artifact
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
  comp-evaluate-model:
    executorLabel: exec-evaluate-model
    inputDefinitions:
      artifacts:
        model_in:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        test_fe:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        fp_cost_per_case:
          defaultValue: 50.0
          isOptional: true
          parameterType: NUMBER_DOUBLE
        fraud_cost_per_case:
          defaultValue: 1000.0
          isOptional: true
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        classification_metrics:
          artifactType:
            schemaTitle: system.ClassificationMetrics
            schemaVersion: 0.0.1
        metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        report_html:
          artifactType:
            schemaTitle: system.HTML
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
  comp-feature-engineer:
    executorLabel: exec-feature-engineer
    inputDefinitions:
      artifacts:
        test_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        train_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        test_fe:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        train_fe:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
  comp-fraud-pipeline:
    dag:
      tasks:
        condition-1:
          componentRef:
            name: comp-condition-1
          dependentTasks:
          - evaluate-model
          - train-model
          inputs:
            artifacts:
              pipelinechannel--evaluate-model-metrics:
                taskOutputArtifact:
                  outputArtifactKey: metrics
                  producerTask: evaluate-model
              pipelinechannel--train-model-model_out:
                taskOutputArtifact:
                  outputArtifactKey: model_out
                  producerTask: train-model
            parameters:
              pipelinechannel--auc_threshold:
                componentInputParameter: auc_threshold
              pipelinechannel--evaluate-model-Output:
                taskOutputParameter:
                  outputParameterKey: Output
                  producerTask: evaluate-model
          taskInfo:
            name: condition-1
          triggerPolicy:
            condition: inputs.parameter_values['pipelinechannel--evaluate-model-Output']
              != 'skip_deploy'
        evaluate-model:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-evaluate-model
          dependentTasks:
          - feature-engineer
          - train-model
          inputs:
            artifacts:
              model_in:
                taskOutputArtifact:
                  outputArtifactKey: model_out
                  producerTask: train-model
              test_fe:
                taskOutputArtifact:
                  outputArtifactKey: test_fe
                  producerTask: feature-engineer
          retryPolicy:
            backoffDuration: 0s
            backoffFactor: 2.0
            backoffMaxDuration: 3600s
            maxRetryCount: 1
          taskInfo:
            name: evaluate-model
        feature-engineer:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-feature-engineer
          dependentTasks:
          - preprocess-data
          inputs:
            artifacts:
              test_data:
                taskOutputArtifact:
                  outputArtifactKey: test_data
                  producerTask: preprocess-data
              train_data:
                taskOutputArtifact:
                  outputArtifactKey: train_data
                  producerTask: preprocess-data
          retryPolicy:
            backoffDuration: 0s
            backoffFactor: 2.0
            backoffMaxDuration: 3600s
            maxRetryCount: 2
          taskInfo:
            name: feature-engineer
        ingest-data:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-ingest-data
          retryPolicy:
            backoffDuration: 0s
            backoffFactor: 2.0
            backoffMaxDuration: 3600s
            maxRetryCount: 2
          taskInfo:
            name: ingest-data
        preprocess-data:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-preprocess-data
          dependentTasks:
          - validate-data
          inputs:
            artifacts:
              validated:
                taskOutputArtifact:
                  outputArtifactKey: validated
                  producerTask: validate-data
            parameters:
              imbalance_strategy:
                componentInputParameter: imbalance_strategy
              random_state:
                componentInputParameter: random_state
              test_size:
                componentInputParameter: test_size
              time_based_split:
                componentInputParameter: time_based_split
          retryPolicy:
            backoffDuration: 0s
            backoffFactor: 2.0
            backoffMaxDuration: 3600s
            maxRetryCount: 2
          taskInfo:
            name: preprocess-data
        train-model:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-train-model
          dependentTasks:
          - feature-engineer
          inputs:
            artifacts:
              train_fe:
                taskOutputArtifact:
                  outputArtifactKey: train_fe
                  producerTask: feature-engineer
            parameters:
              cost_sensitive:
                componentInputParameter: cost_sensitive
              fn_penalty:
                componentInputParameter: fn_penalty
              max_depth:
                componentInputParameter: max_depth
              model_type:
                componentInputParameter: model_type
              n_estimators:
                componentInputParameter: n_estimators
              random_state:
                componentInputParameter: random_state
          retryPolicy:
            backoffDuration: 0s
            backoffFactor: 2.0
            backoffMaxDuration: 3600s
            maxRetryCount: 2
          taskInfo:
            name: train-model
        validate-data:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-validate-data
          dependentTasks:
          - ingest-data
          inputs:
            artifacts:
              raw_data:
                taskOutputArtifact:
                  outputArtifactKey: raw_data
                  producerTask: ingest-data
          retryPolicy:
            backoffDuration: 0s
            backoffFactor: 2.0
            backoffMaxDuration: 3600s
            maxRetryCount: 2
          taskInfo:
            name: validate-data
    inputDefinitions:
      parameters:
        auc_threshold:
          defaultValue: 0.85
          isOptional: true
          parameterType: NUMBER_DOUBLE
        cost_sensitive:
          defaultValue: false
          isOptional: true
          parameterType: BOOLEAN
        fn_penalty:
          defaultValue: 5.0
          isOptional: true
          parameterType: NUMBER_DOUBLE
        imbalance_strategy:
          defaultValue: class_weight
          isOptional: true
          parameterType: STRING
        max_depth:
          defaultValue: 6.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        model_type:
          defaultValue: xgboost
          isOptional: true
          parameterType: STRING
        n_estimators:
          defaultValue: 200.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        random_state:
          defaultValue: 42.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        test_size:
          defaultValue: 0.2
          isOptional: true
          parameterType: NUMBER_DOUBLE
        time_based_split:
          defaultValue: false
          isOptional: true
          parameterType: BOOLEAN
  comp-ingest-data:
    executorLabel: exec-ingest-data
    outputDefinitions:
      artifacts:
        raw_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
  comp-preprocess-data:
    executorLabel: exec-preprocess-data
    inputDefinitions:
      artifacts:
        validated:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        imbalance_strategy:
          defaultValue: none
          isOptional: true
          parameterType: STRING
        random_state:
          defaultValue: 42.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        test_size:
          defaultValue: 0.2
          isOptional: true
          parameterType: NUMBER_DOUBLE
        time_based_split:
          defaultValue: false
          isOptional: true
          parameterType: BOOLEAN
    outputDefinitions:
      artifacts:
        test_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        train_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
  comp-train-model:
    executorLabel: exec-train-model
    inputDefinitions:
      artifacts:
        train_fe:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        cost_sensitive:
          defaultValue: false
          isOptional: true
          parameterType: BOOLEAN
        fn_penalty:
          defaultValue: 5.0
          isOptional: true
          parameterType: NUMBER_DOUBLE
        max_depth:
          defaultValue: 6.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        model_type:
          defaultValue: xgboost
          isOptional: true
          parameterType: STRING
        n_estimators:
          defaultValue: 200.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        random_state:
          defaultValue: 42.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        model_out:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
  comp-validate-data:
    executorLabel: exec-validate-data
    inputDefinitions:
      artifacts:
        raw_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        max_fraud_rate:
          defaultValue: 0.2
          isOptional: true
          parameterType: NUMBER_DOUBLE
        max_missing_pct:
          defaultValue: 50.0
          isOptional: true
          parameterType: NUMBER_DOUBLE
        min_fraud_rate:
          defaultValue: 0.005
          isOptional: true
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        validated:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-deploy-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - deploy_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef deploy_model(\n    model_in: Input[Model],\n    metrics: Input[Metrics],\n\
          \    deployed_marker: Output[Artifact],\n    auc_threshold: float = 0.85,\n\
          ) -> str:\n    import json\n    import os\n    import pickle\n    import\
          \ shutil\n    from pathlib import Path\n\n    # Read AUC from the metrics\
          \ artifact (KFP writes a JSON file at metrics.path)\n    try:\n        with\
          \ open(metrics.path, \"r\") as f:\n            m = json.load(f)\n    except\
          \ Exception:\n        m = {}\n    auc = float(m.get(\"auc_roc\", 0.0))\n\
          \n    decision = \"deploy\" if auc >= auc_threshold else \"reject\"\n\n\
          \    out_dir = Path(deployed_marker.path).parent\n    out_dir.mkdir(parents=True,\
          \ exist_ok=True)\n\n    if decision == \"deploy\":\n        # Copy the model\
          \ file beside the marker (acts as \"deployed\" artifact)\n        target\
          \ = out_dir / \"deployed_model.pkl\"\n        shutil.copyfile(model_in.path,\
          \ target)\n        # Mock a registry-style version tag\n        with open(deployed_marker.path,\
          \ \"w\") as f:\n            json.dump({\n                \"decision\": \"\
          deploy\",\n                \"auc_roc\": auc,\n                \"threshold\"\
          : auc_threshold,\n                \"model_path\": str(target),\n       \
          \     }, f, indent=2)\n    else:\n        with open(deployed_marker.path,\
          \ \"w\") as f:\n            json.dump({\n                \"decision\": \"\
          reject\",\n                \"auc_roc\": auc,\n                \"threshold\"\
          : auc_threshold,\n                \"reason\": f\"AUC {auc:.4f} below threshold\
          \ {auc_threshold}\",\n            }, f, indent=2)\n\n    print(f\"[DEPLOY]\
          \ {decision} (auc={auc:.4f}, threshold={auc_threshold})\")\n    return decision\n\
          \n"
        image: mlops-a4-base:v1
    exec-evaluate-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate_model(\n    test_fe: Input[Dataset],\n    model_in:\
          \ Input[Model],\n    metrics: Output[Metrics],\n    classification_metrics:\
          \ Output[ClassificationMetrics],\n    report_html: Output[HTML],\n    fraud_cost_per_case:\
          \ float = 1000.0,    # avg loss when fraud is missed\n    fp_cost_per_case:\
          \ float = 50.0,         # cost of a wrongly flagged transaction\n) -> str:\n\
          \    import base64\n    import io\n    import json\n    import pickle\n\
          \    import numpy as np\n    import pandas as pd\n    import matplotlib\n\
          \    matplotlib.use(\"Agg\")\n    import matplotlib.pyplot as plt\n    import\
          \ seaborn as sns\n    from sklearn.metrics import (\n        accuracy_score,\
          \ precision_score, recall_score, f1_score,\n        confusion_matrix, roc_auc_score,\
          \ average_precision_score,\n    )\n\n    df = pd.read_csv(test_fe.path)\n\
          \    y = df[\"isFraud\"].values.astype(int)\n    X = df.drop(columns=[\"\
          isFraud\"]).values\n    with open(model_in.path, \"rb\") as f:\n       \
          \ bundle = pickle.load(f)\n    model = bundle[\"model\"]\n\n    proba =\
          \ model.predict_proba(X)[:, 1]\n    pred = (proba >= 0.5).astype(int)\n\n\
          \    cm = confusion_matrix(y, pred)\n    tn, fp, fn, tp = cm.ravel() if\
          \ cm.size == 4 else (0, 0, 0, 0)\n\n    scores = {\n        \"accuracy\"\
          :  float(accuracy_score(y, pred)),\n        \"precision\": float(precision_score(y,\
          \ pred, zero_division=0)),\n        \"recall\":    float(recall_score(y,\
          \ pred, zero_division=0)),\n        \"f1\":        float(f1_score(y, pred,\
          \ zero_division=0)),\n        \"auc_roc\":   float(roc_auc_score(y, proba))\
          \ if len(np.unique(y)) > 1 else 0.0,\n        \"ap\":        float(average_precision_score(y,\
          \ proba)) if len(np.unique(y)) > 1 else 0.0,\n        \"tn\": int(tn), \"\
          fp\": int(fp), \"fn\": int(fn), \"tp\": int(tp),\n        \"business_cost_usd\"\
          : float(fn * fraud_cost_per_case + fp * fp_cost_per_case),\n        \"fraud_loss_usd\"\
          : float(fn * fraud_cost_per_case),\n        \"false_alarm_cost_usd\": float(fp\
          \ * fp_cost_per_case),\n    }\n    for k, v in scores.items():\n       \
          \ if isinstance(v, float):\n            metrics.log_metric(k, v)\n\n   \
          \ # Confusion matrix artifact\n    if cm.size == 4:\n        classification_metrics.log_confusion_matrix([\"\
          legit\", \"fraud\"], cm.tolist())\n\n    # Confusion matrix figure\n   \
          \ fig, ax = plt.subplots(figsize=(4, 3.5))\n    sns.heatmap(cm, annot=True,\
          \ fmt=\"d\", cmap=\"Reds\",\n                xticklabels=[\"legit\", \"\
          fraud\"], yticklabels=[\"legit\", \"fraud\"], ax=ax)\n    ax.set_xlabel(\"\
          Predicted\"); ax.set_ylabel(\"True\")\n    ax.set_title(f\"Confusion Matrix\
          \ - {bundle.get('model_type', '?')}\")\n    buf = io.BytesIO(); fig.tight_layout();\
          \ fig.savefig(buf, format=\"png\", dpi=120); plt.close(fig)\n    png_b64\
          \ = base64.b64encode(buf.getvalue()).decode(\"ascii\")\n\n    html = (\n\
          \        f\"<!doctype html><html><body style='font-family:sans-serif'>\"\
          \n        f\"<h2>Fraud-detection Eval -- {bundle.get('model_type','?')}\
          \ \"\n        f\"{'(cost-sensitive)' if bundle.get('cost_sensitive') else\
          \ '(standard)'}</h2>\"\n        f\"<p><b>Hyperparams:</b> {bundle.get('params')}</p>\"\
          \n        f\"<table border='1' cellpadding='6' style='border-collapse:collapse'>\"\
          \n        + \"\".join(f\"<tr><td><b>{k}</b></td><td>{v:.4f}</td></tr>\"\
          \ if isinstance(v, float)\n                  else f\"<tr><td><b>{k}</b></td><td>{v}</td></tr>\"\
          \ for k, v in scores.items())\n        + f\"</table><br/><img src='data:image/png;base64,{png_b64}'/>\"\
          \n          f\"<p><b>Business cost:</b> ${scores['business_cost_usd']:.2f}\
          \ \"\n          f\"(fraud_loss={scores['fraud_loss_usd']:.2f} + \"\n   \
          \       f\"false_alarm={scores['false_alarm_cost_usd']:.2f})</p>\"\n   \
          \       f\"</body></html>\"\n    )\n    with open(report_html.path, \"w\"\
          ) as f:\n        f.write(html)\n\n    print(f\"[EVAL] {json.dumps(scores)}\"\
          )\n    return json.dumps(scores)\n\n"
        image: mlops-a4-base:v1
    exec-feature-engineer:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - feature_engineer
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef feature_engineer(\n    train_data: Input[Dataset],\n    test_data:\
          \ Input[Dataset],\n    train_fe: Output[Dataset],\n    test_fe: Output[Dataset],\n\
          ) -> str:\n    import json\n    import numpy as np\n    import pandas as\
          \ pd\n\n    train = pd.read_csv(train_data.path)\n    test = pd.read_csv(test_data.path)\n\
          \n    def _add_features(df):\n        if \"TransactionAmt\" in df.columns:\n\
          \            df[\"amt_log\"] = np.log1p(df[\"TransactionAmt\"])\n      \
          \      df[\"amt_zscore\"] = (df[\"TransactionAmt\"] - df[\"TransactionAmt\"\
          ].mean()) / df[\"TransactionAmt\"].std()\n        if \"TransactionDT\" in\
          \ df.columns:\n            df[\"hour\"] = (df[\"TransactionDT\"] // 3600)\
          \ % 24\n            df[\"day\"] = (df[\"TransactionDT\"] // 86400)\n   \
          \     return df\n\n    train = _add_features(train)\n    test = _add_features(test)\n\
          \n    # card1 mean amount (computed from train, applied to test)\n    if\
          \ \"card1\" in train.columns and \"TransactionAmt\" in train.columns:\n\
          \        card1_mean_amt = train.groupby(\"card1\")[\"TransactionAmt\"].mean().to_dict()\n\
          \        global_mean = train[\"TransactionAmt\"].mean()\n        train[\"\
          card1_mean_amt\"] = train[\"card1\"].map(card1_mean_amt).fillna(global_mean)\n\
          \        test[\"card1_mean_amt\"] = test[\"card1\"].map(card1_mean_amt).fillna(global_mean)\n\
          \n    train.to_csv(train_fe.path, index=False)\n    test.to_csv(test_fe.path,\
          \ index=False)\n\n    summary = {\n        \"n_train\": int(len(train)),\n\
          \        \"n_test\": int(len(test)),\n        \"added_features\": [c for\
          \ c in train.columns if c in\n                           (\"amt_log\", \"\
          amt_zscore\", \"hour\", \"day\", \"card1_mean_amt\")],\n        \"n_features\"\
          : int(train.shape[1] - 1),  # minus isFraud\n    }\n    print(f\"[FE] {summary}\"\
          )\n    return json.dumps(summary)\n\n"
        image: mlops-a4-base:v1
    exec-ingest-data:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ingest_data
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
