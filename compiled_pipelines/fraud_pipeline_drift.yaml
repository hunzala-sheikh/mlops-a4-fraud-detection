          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef validate_data(\n    raw_data: Input[Dataset],\n    validated:\
          \ Output[Dataset],\n    max_missing_pct: float = 50.0,\n    min_fraud_rate:\
          \ float = 0.005,\n    max_fraud_rate: float = 0.20,\n) -> str:\n    import\
          \ json\n    import pandas as pd\n\n    df = pd.read_csv(raw_data.path)\n\
          \n    # Schema: required columns\n    required = {\"TransactionID\", \"\
          TransactionAmt\", \"isFraud\"}\n    missing_cols = required - set(df.columns)\n\
          \    if missing_cols:\n        raise RuntimeError(f\"[VALIDATE] schema mismatch:\
          \ missing {missing_cols}\")\n\n    # Per-column missing %\n    miss_pct\
          \ = (df.isna().mean() * 100).round(2).to_dict()\n    bad = {k: v for k,\
          \ v in miss_pct.items() if v > max_missing_pct}\n    if bad:\n        raise\
          \ RuntimeError(f\"[VALIDATE] columns over {max_missing_pct}% missing: {bad}\"\
          )\n\n    # Fraud rate sanity\n    fr = df[\"isFraud\"].mean()\n    if not\
          \ (min_fraud_rate <= fr <= max_fraud_rate):\n        raise RuntimeError(f\"\
          [VALIDATE] fraud_rate {fr:.4f} outside [{min_fraud_rate}, {max_fraud_rate}]\"\
          )\n\n    df.to_csv(validated.path, index=False)\n    report = {\"n_rows\"\
          : len(df), \"fraud_rate\": float(fr), \"max_missing_col_pct\": float(max(miss_pct.values()))}\n\
          \    print(f\"[VALIDATE] OK: {report}\")\n    return json.dumps(report)\n\
          \n"
