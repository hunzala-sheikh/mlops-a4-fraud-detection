          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef preprocess_data(\n    validated: Input[Dataset],\n    train_data:\
          \ Output[Dataset],\n    test_data: Output[Dataset],\n    test_size: float\
          \ = 0.2,\n    imbalance_strategy: str = \"none\",  # none | smote | undersample\
          \ | class_weight\n    random_state: int = 42,\n    time_based_split: bool\
          \ = False,    # if True, train on earlier TransactionDT\n) -> str:\n   \
          \ import json\n    import numpy as np\n    import pandas as pd\n    from\
          \ sklearn.model_selection import train_test_split\n\n    df = pd.read_csv(validated.path)\n\
          \    y = df[\"isFraud\"].values.astype(int)\n    X = df.drop(columns=[\"\
          isFraud\"]).copy()\n\n    # ---------- impute ----------\n    num_cols =\
          \ X.select_dtypes(include=[np.number]).columns.tolist()\n    cat_cols =\
          \ X.select_dtypes(include=[\"object\"]).columns.tolist()\n    for c in num_cols:\n\
          \        X[c] = X[c].fillna(X[c].median())\n    for c in cat_cols:\n   \
          \     X[c] = X[c].fillna(X[c].mode().iloc[0] if not X[c].mode().empty else\
          \ \"MISSING\")\n\n    # ---------- target encoding for high-cardinality\
          \ ----------\n    high_card = [c for c in cat_cols if X[c].nunique() > 30]\n\
          \    low_card = [c for c in cat_cols if c not in high_card]\n    for c in\
          \ high_card:\n        # smoothed target encoding: (sum + alpha*global) /\
          \ (count + alpha)\n        global_mean = y.mean()\n        alpha = 10.0\n\
          \        agg = pd.DataFrame({\"y\": y, \"x\": X[c].values}).groupby(\"x\"\
          )[\"y\"].agg([\"sum\", \"count\"])\n        enc = (agg[\"sum\"] + alpha\
          \ * global_mean) / (agg[\"count\"] + alpha)\n        X[c + \"_te\"] = X[c].map(enc).fillna(global_mean)\n\
          \        X = X.drop(columns=[c])\n\n    # ---------- one-hot for low-card\
          \ ----------\n    if low_card:\n        X = pd.get_dummies(X, columns=low_card,\
          \ dummy_na=False, drop_first=True)\n\n    # ---------- split ----------\n\
          \    if time_based_split and \"TransactionDT\" in X.columns:\n        #\
          \ earlier 1 - test_size for train\n        order = X[\"TransactionDT\"].argsort().values\n\
          \        cut = int(len(X) * (1 - test_size))\n        train_idx, test_idx\
          \ = order[:cut], order[cut:]\n        X_train, X_test = X.iloc[train_idx],\
          \ X.iloc[test_idx]\n        y_train, y_test = y[train_idx], y[test_idx]\n\
          \    else:\n        X_train, X_test, y_train, y_test = train_test_split(\n\
          \            X, y, test_size=test_size, random_state=random_state, stratify=y\n\
          \        )\n\n    # ---------- imbalance handling ----------\n    if imbalance_strategy\
          \ == \"smote\":\n        from imblearn.over_sampling import SMOTE\n    \
          \    # SMOTE only on training\n        X_train_np = X_train.select_dtypes(include=[np.number]).values\n\
          \        feat_cols = X_train.select_dtypes(include=[np.number]).columns\n\
          \        sm = SMOTE(random_state=random_state, sampling_strategy=0.30) \
          \ # raise minority to 30%\n        X_train_res, y_train = sm.fit_resample(X_train_np,\
          \ y_train)\n        X_train = pd.DataFrame(X_train_res, columns=feat_cols)\n\
          \        # recompute X_test with same numeric cols\n        X_test = X_test[feat_cols]\n\
          \    elif imbalance_strategy == \"undersample\":\n        from imblearn.under_sampling\
          \ import RandomUnderSampler\n        rus = RandomUnderSampler(random_state=random_state,\
          \ sampling_strategy=0.30)\n        X_train_np = X_train.select_dtypes(include=[np.number]).values\n\
          \        feat_cols = X_train.select_dtypes(include=[np.number]).columns\n\
          \        X_train_res, y_train = rus.fit_resample(X_train_np, y_train)\n\
          \        X_train = pd.DataFrame(X_train_res, columns=feat_cols)\n      \
          \  X_test = X_test[feat_cols]\n    elif imbalance_strategy == \"class_weight\"\
          :\n        # No resampling \u2014 weight is applied in training step\n \
          \       X_train = X_train.select_dtypes(include=[np.number])\n        X_test\
          \ = X_test[X_train.columns]\n    else:\n        X_train = X_train.select_dtypes(include=[np.number])\n\
          \        X_test = X_test[X_train.columns]\n\n    # ---------- write artifacts\
          \ ----------\n    pd.concat([X_train.reset_index(drop=True),\n         \
          \      pd.Series(y_train, name=\"isFraud\").reset_index(drop=True)], axis=1)\
          \ \\\n      .to_csv(train_data.path, index=False)\n    pd.concat([X_test.reset_index(drop=True),\n\
          \               pd.Series(y_test, name=\"isFraud\").reset_index(drop=True)],\
          \ axis=1) \\\n      .to_csv(test_data.path, index=False)\n\n    summary\
          \ = {\n        \"imbalance_strategy\": imbalance_strategy,\n        \"n_train\"\
          : int(len(X_train)),\n        \"n_test\": int(len(X_test)),\n        \"\
          n_features\": int(X_train.shape[1]),\n        \"train_fraud_rate\": float(np.mean(y_train)),\n\
          \        \"test_fraud_rate\": float(np.mean(y_test)),\n        \"high_card_target_encoded\"\
          : high_card,\n    }\n    print(f\"[PREPROCESS] {summary}\")\n    return\
          \ json.dumps(summary)\n\n"
