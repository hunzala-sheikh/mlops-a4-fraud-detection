# Prometheus config for the fraud-detection observability stack.
# Scrapes:
#   - fraud-inference-api      (model-level metrics: recall proxy, FPR, P/R tradeoff, proba dist)
#   - kubernetes-pods          (system-level: cpu/mem)
#   - prometheus                (self)
# Loads alert rules from /etc/prometheus/alerts/*.yml (mounted via ConfigMap).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: minikube
    service: fraud-detection

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager.fraud-experiments.svc:9093']

scrape_configs:
  - job_name: 'fraud-inference-api'
    metrics_path: /metrics
    static_configs:
      - targets:
          - fraud-inference.fraud-experiments.svc:8000
        labels:
          tier: model
          app: fraud-inference

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [fraud-experiments]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: 'true'
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
